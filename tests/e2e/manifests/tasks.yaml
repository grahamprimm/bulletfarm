# =============================================================================
# NEW E2E TEST TASKS - Fresh scenarios to test memory pipeline
# =============================================================================

# =============================================================================
# Scenario 1: alpha-agent — Add database connection pooling (Python)
# =============================================================================
apiVersion: agents.bulletfarm.io/v1alpha1
kind: AgentTask
metadata:
  name: alpha-db-pooling
  labels:
    app.kubernetes.io/part-of: bulletfarm-e2e
    e2e-scenario: "S1"
spec:
  agentRef: "alpha-agent"
  description: "Implement database connection pooling"
  prompt: "Add SQLite database connection pooling to the Flask application. Create a db.py module with connection pool management using sqlite3. Add functions for getting and releasing connections. Update main.py to use the connection pool for all database operations."
  targetBranch: "e2e-alpha-db-pooling"
  skills:
    - code-edit
---
# =============================================================================
# Scenario 2: alpha-agent — Add API rate limiting (Python)
# =============================================================================
apiVersion: agents.bulletfarm.io/v1alpha1
kind: AgentTask
metadata:
  name: alpha-rate-limiting
  labels:
    app.kubernetes.io/part-of: bulletfarm-e2e
    e2e-scenario: "S2"
spec:
  agentRef: "alpha-agent"
  description: "Implement API rate limiting middleware"
  prompt: "Add rate limiting to the Flask API using a simple in-memory counter. Create middleware that limits requests to 100 per minute per IP address. Return 429 Too Many Requests when limit is exceeded. Add rate limit headers (X-RateLimit-Limit, X-RateLimit-Remaining) to all responses."
  targetBranch: "e2e-alpha-rate-limiting"
  skills:
    - code-edit
    - testing
---
# =============================================================================
# Scenario 3: beta-agent — Add metrics endpoint (Go)
# =============================================================================
apiVersion: agents.bulletfarm.io/v1alpha1
kind: AgentTask
metadata:
  name: beta-metrics
  labels:
    app.kubernetes.io/part-of: bulletfarm-e2e
    e2e-scenario: "S3"
spec:
  agentRef: "beta-agent"
  description: "Add Prometheus metrics endpoint"
  prompt: "Add a /metrics endpoint to the Go HTTP server that exposes Prometheus-style metrics. Track request count, request duration histogram, and active connections gauge. Use the expvar package or implement simple counters. Format output as Prometheus text format."
  targetBranch: "e2e-beta-metrics"
  skills:
    - code-edit
---
# =============================================================================
# Scenario 4: beta-agent — Add configuration management (Go)
# =============================================================================
apiVersion: agents.bulletfarm.io/v1alpha1
kind: AgentTask
metadata:
  name: beta-config
  labels:
    app.kubernetes.io/part-of: bulletfarm-e2e
    e2e-scenario: "S4"
spec:
  agentRef: "beta-agent"
  description: "Implement configuration management system"
  prompt: "Create a config.go file that loads configuration from environment variables and a config.yaml file. Support settings for server port, log level, timeout values, and feature flags. Add validation for required fields. Update main.go to use the configuration system. Document all configuration options in README.md."
  targetBranch: "e2e-beta-config"
  skills:
    - code-edit
    - documentation
---
# =============================================================================
# Scenario 5: gamma-agent — Add request logging middleware (Node.js)
# =============================================================================
apiVersion: agents.bulletfarm.io/v1alpha1
kind: AgentTask
metadata:
  name: gamma-logging
  labels:
    app.kubernetes.io/part-of: bulletfarm-e2e
    e2e-scenario: "S5"
spec:
  agentRef: "gamma-agent"
  description: "Add structured request logging"
  prompt: "Create a logging middleware for the Express API that logs all requests in JSON format. Include timestamp, method, path, status code, response time, and request ID. Use a simple console logger with structured output. Add the middleware to index.js before route handlers."
  targetBranch: "e2e-gamma-logging"
  skills:
    - code-edit
---
# =============================================================================
# Scenario 6: gamma-agent — Add API versioning (Node.js)
# =============================================================================
apiVersion: agents.bulletfarm.io/v1alpha1
kind: AgentTask
metadata:
  name: gamma-versioning
  labels:
    app.kubernetes.io/part-of: bulletfarm-e2e
    e2e-scenario: "S6"
spec:
  agentRef: "gamma-agent"
  description: "Implement API versioning system"
  prompt: "Add API versioning to the Express application. Create /v1 and /v2 route prefixes. Move existing routes to /v1. Create /v2 routes with enhanced response format that includes metadata (version, timestamp, request_id). Add a root endpoint that lists available API versions. Update tests to cover both versions."
  targetBranch: "e2e-gamma-versioning"
  skills:
    - code-edit
    - testing
    - documentation
