# --- Agent: alpha-agent (Python repo) ---
apiVersion: agents.bulletfarm.io/v1alpha1
kind: Agent
metadata:
  name: alpha-agent
  labels:
    app.kubernetes.io/part-of: bulletfarm-e2e
spec:
  repository: "grahamprimm/bulletfarm-test-repo-alpha"
  branch: "main"
  workerImage: "bulletfarm/worker:latest"
  defaultSkills:
    - code-edit
    - testing
  config:
    llmProvider: "openai"
    llmModel: "gpt-4o-mini"
    elasticsearchURL: "http://elasticsearch-master:9200"
---
