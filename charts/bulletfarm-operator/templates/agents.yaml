{{- range $name, $agent := .Values.agents }}
---
apiVersion: agents.bulletfarm.io/v1alpha1
kind: Agent
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "agent-operator.labels" $ | nindent 4 }}
    app.kubernetes.io/component: agent
    agents.bulletfarm.io/agent-name: {{ $name }}
    {{- with $agent.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annotations := merge ($agent.annotations | default dict) ($.Values.commonAnnotations | default dict) }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  repository: {{ $agent.repository | quote }}
  {{- if $agent.branch }}
  branch: {{ $agent.branch | quote }}
  {{- end }}
  workerImage: {{ printf "%s:%s" (default $.Values.workerImage.repository $agent.workerImage) (default $.Values.workerImage.tag $agent.workerTag) | quote }}
  {{- with $agent.defaultSkills }}
  defaultSkills:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  config:
    llmProvider: {{ default $.Values.llm.provider ($agent.config).llmProvider | quote }}
    llmModel: {{ default $.Values.llm.model ($agent.config).llmModel | quote }}
    elasticsearchURL: {{ default $.Values.elasticsearch.url ($agent.config).elasticsearchURL | quote }}
{{- end }}
