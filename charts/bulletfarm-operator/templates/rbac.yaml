{{- if .Values.rbac.create }}
# ---------------------------------------------------------------------------
# ClusterRole — operator permissions for CRDs, pods, secrets
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agent-operator.fullname" . }}-manager-role
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
rules:
  # Agent CRD management
  - apiGroups: ["agents.bulletfarm.io"]
    resources: ["agents"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["agents.bulletfarm.io"]
    resources: ["agents/finalizers"]
    verbs: ["update"]
  - apiGroups: ["agents.bulletfarm.io"]
    resources: ["agents/status"]
    verbs: ["get", "patch", "update"]
  # AgentTask CRD management
  - apiGroups: ["agents.bulletfarm.io"]
    resources: ["agenttasks"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["agents.bulletfarm.io"]
    resources: ["agenttasks/finalizers"]
    verbs: ["update"]
  - apiGroups: ["agents.bulletfarm.io"]
    resources: ["agenttasks/status"]
    verbs: ["get", "patch", "update"]
  # Pod management for worker pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Secret access for GitHub token, API keys
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Events for recording reconciliation events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
# ---------------------------------------------------------------------------
# ClusterRoleBinding
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agent-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agent-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.leaderElection.enabled }}
---
# ---------------------------------------------------------------------------
# Leader election Role (namespace-scoped)
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agent-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agent-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agent-operator.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if and .Values.metrics.enabled .Values.metrics.secure }}
---
# ---------------------------------------------------------------------------
# Metrics auth ClusterRole (for authenticated metrics scraping)
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agent-operator.fullname" . }}-metrics-auth
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agent-operator.fullname" . }}-metrics-auth
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agent-operator.fullname" . }}-metrics-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
