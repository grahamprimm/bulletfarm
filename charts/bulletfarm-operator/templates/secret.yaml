{{- if .Values.createSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{- if .Values.createSecret.githubToken }}
  github-token: {{ .Values.createSecret.githubToken | quote }}
  {{- end }}
  {{- if .Values.createSecret.openaiApiKey }}
  openai-api-key: {{ .Values.createSecret.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.createSecret.ollamaBaseUrl }}
  ollama-base-url: {{ .Values.createSecret.ollamaBaseUrl | quote }}
  {{- end }}
{{- end }}
