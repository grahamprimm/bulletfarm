{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agent-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "agent-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow health probe and metrics scraping
    - ports:
        - port: {{ .Values.healthProbe.port }}
          protocol: TCP
        {{- if .Values.metrics.enabled }}
        - port: {{ (split ":" .Values.metrics.bindAddress)._1 | default 8443 }}
          protocol: TCP
        {{- end }}
        {{- if .Values.webhook.enabled }}
        - port: {{ .Values.webhook.port }}
          protocol: TCP
        {{- end }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow communication with the Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # Allow communication with worker pods
    - ports:
        - port: 8000
          protocol: TCP
      podSelector:
        matchLabels:
          app: bulletfarm-worker
    # Allow communication with Elasticsearch
    - ports:
        - port: 9200
          protocol: TCP
    {{- with .Values.networkPolicy.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
