---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agents.bulletfarm.io
  resources:
  - agents
  - agenttasks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agents.bulletfarm.io
  resources:
  - agents/finalizers
  - agenttasks/finalizers
  verbs:
  - update
- apiGroups:
  - agents.bulletfarm.io
  resources:
  - agents/status
  - agenttasks/status
  verbs:
  - get
  - patch
  - update
