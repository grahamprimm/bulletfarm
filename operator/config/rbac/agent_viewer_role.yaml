# permissions for end users to view agents.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: agent-viewer-role
rules:
- apiGroups:
  - agents.bulletfarm.io
  resources:
  - agents
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agents.bulletfarm.io
  resources:
  - agents/status
  verbs:
  - get
