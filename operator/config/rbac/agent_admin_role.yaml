# permissions for admin users to manage agents.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: agent-admin-role
rules:
- apiGroups:
  - agents.bulletfarm.io
  resources:
  - agents
  verbs:
  - '*'
- apiGroups:
  - agents.bulletfarm.io
  resources:
  - agents/status
  verbs:
  - get
